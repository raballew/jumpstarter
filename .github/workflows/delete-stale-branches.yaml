name: Delete Stale Branches

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log branches that would be deleted without actually deleting them"
        type: boolean
        default: false

permissions: {}

jobs:
  delete-stale-branches:
    name: Delete stale branches
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Delete branches with no commits in 30 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          cutoff_date=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Cutoff date: $cutoff_date"
          echo "Dry run: $DRY_RUN"
          echo ""

          sanitize_for_markdown() {
            printf '%s' "$1" | sed 's/|/\\|/g; s/`/\\`/g'
          }

          deleted=0
          failed=0
          skipped=0
          page=1
          summary_lines=""

          while true; do
            branches=$(gh api "repos/${{ github.repository }}/branches?per_page=100&page=${page}" \
              --jq '.[] | "\(.name)\t\(.protected)"')

            if [ -z "$branches" ]; then
              break
            fi

            while IFS=$'\t' read -r branch_name is_protected; do
              safe_name=$(sanitize_for_markdown "$branch_name")

              if [ -z "$branch_name" ] || [[ "$is_protected" != "true" && "$is_protected" != "false" ]]; then
                echo "SKIP (invalid data): $branch_name"
                summary_lines="${summary_lines}| \`${safe_name}\` | Skipped | invalid data | - |"$'\n'
                skipped=$((skipped + 1))
                continue
              fi

              encoded_branch=$(printf '%s' "$branch_name" | jq -sRr '@uri')

              if [ "$is_protected" = "true" ]; then
                echo "SKIP (protected): $branch_name"
                summary_lines="${summary_lines}| \`${safe_name}\` | Skipped | protected | - |"$'\n'
                skipped=$((skipped + 1))
                continue
              fi

              open_pulls=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${encoded_branch}&state=open&per_page=1" \
                --jq 'length')

              if [ "$open_pulls" != "0" ]; then
                echo "SKIP (open PR): $branch_name"
                summary_lines="${summary_lines}| \`${safe_name}\` | Skipped | open PR | - |"$'\n'
                skipped=$((skipped + 1))
                continue
              fi

              last_commit_date=$(gh api "repos/${{ github.repository }}/commits?sha=${encoded_branch}&per_page=1" \
                --jq '.[0].commit.committer.date')

              if [ -z "$last_commit_date" ] || [[ "$last_commit_date" < "$cutoff_date" ]]; then
                local_reason="stale"
                if [ -z "$last_commit_date" ]; then
                  local_reason="orphan"
                fi
                if [ "$DRY_RUN" = "true" ]; then
                  echo "DRY-RUN DELETE ($local_reason): $branch_name (last commit: ${last_commit_date:-none})"
                  summary_lines="${summary_lines}| \`${safe_name}\` | Dry-run | ${local_reason} | ${last_commit_date:-none} |"$'\n'
                  deleted=$((deleted + 1))
                else
                  echo "DELETE ($local_reason): $branch_name (last commit: ${last_commit_date:-none})"
                  if ! gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${encoded_branch}"; then
                    echo "WARN: failed to delete $branch_name"
                    summary_lines="${summary_lines}| \`${safe_name}\` | Failed | ${local_reason} | ${last_commit_date:-none} |"$'\n'
                    failed=$((failed + 1))
                  else
                    summary_lines="${summary_lines}| \`${safe_name}\` | Deleted | ${local_reason} | ${last_commit_date:-none} |"$'\n'
                    deleted=$((deleted + 1))
                  fi
                fi
              else
                echo "SKIP (recent): $branch_name (last commit: $last_commit_date)"
                summary_lines="${summary_lines}| \`${safe_name}\` | Skipped | recent | ${last_commit_date} |"$'\n'
                skipped=$((skipped + 1))
              fi
            done <<< "$branches"

            page=$((page + 1))
          done

          echo ""
          echo "Summary: $deleted deleted, $failed failed, $skipped skipped"

          {
            echo "## Delete Stale Branches"
            echo ""
            echo "**Cutoff date:** ${cutoff_date}"
            echo "**Dry run:** ${DRY_RUN}"
            echo ""
            echo "| Branch | Action | Reason | Last Commit |"
            echo "|--------|--------|--------|-------------|"
            if [ -n "$summary_lines" ]; then
              printf '%s' "$summary_lines"
            else
              echo "| - | - | No branches found | - |"
            fi
            echo ""
            echo "**Total:** ${deleted} deleted, ${failed} failed, ${skipped} skipped"
          } >> "$GITHUB_STEP_SUMMARY"
